name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.10.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Contracts
        run: pnpm --filter @scryvex/contracts run build

      - name: Typecheck Server
        run: pnpm --filter @scryvex/server run typecheck

      - name: Test Server
        run: pnpm --filter @scryvex/server run test

      - name: Build Server
        run: pnpm --filter @scryvex/server run build

      - name: Typecheck Frontend
        run: pnpm --filter frontend run typecheck

      - name: Lint Frontend
        run: pnpm --filter frontend run lint

      - name: Build Frontend
        run: pnpm --filter frontend run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile Build
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --build-arg BUILD_VERSION=3.0.0-alpha.1 \
            --build-arg SOURCE_REF=${GITHUB_SHA} \
            --file addon/Dockerfile \
            addon/
