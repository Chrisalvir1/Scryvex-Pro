# ============================================================
# Scryvex Pro — docker-compose.yml
# Fork customizado de Scrypted con core v0.3.147 fijado
# Repo: github.com/Chrisalvir1/Scryvex-Pro
# ============================================================
#
# Uso:
#   cp .env.example .env       # configurar variables
#   docker compose up -d       # levantar
#   docker compose logs -f     # ver logs


# ─── Volumen NVR externo (opcional) ─────────────────────────
# Descomenta solo UNO si usás storage de red:
#
# volumes:
#     nvr:
#         driver_opts:
#             type: cifs
#             o: username=[user],password=[pass],vers=3.0,file_mode=0777,dir_mode=0777
#             device: //[ip]/[path]
#     nvr:
#         driver_opts:
#             type: "nfs"
#             o: "addr=[ip],nolock,soft,rw"
#             device: ":[path]"


services:

    # ── Scryvex Pro (core Scrypted v0.3.147 fijado) ──────────
    scryvex:
        image: ghcr.io/koush/scrypted

        container_name: scryvex
        restart: unless-stopped
        network_mode: host

        environment:
            # ── Auto-update webhook (via watchtower) ──
            - SCRYPTED_WEBHOOK_UPDATE_AUTHORIZATION=Bearer ${WATCHTOWER_HTTP_API_TOKEN:-env_missing_fallback}
            - SCRYPTED_WEBHOOK_UPDATE=http://localhost:10444/v1/update

            # ── NVR: descomentar para habilitar grabaciones ──
            # - SCRYPTED_NVR_VOLUME=/nvr

            # ── DNS personalizado (fallback a Cloudflare/Google) ──
            # Sobrescribir en .env si tenés DNS local
            # - SCRYPTED_DNS_SERVER_0=192.168.1.1

            # ── Avahi / mDNS para HomeKit ──
            # Opción A (host networking): descomenta la siguiente línea
            # y deshabilita avahi-daemon en el host antes de usarla:
            #   sudo systemctl disable --now avahi-daemon avahi-daemon.socket
            # - SCRYPTED_DOCKER_AVAHI=true

        volumes:
            # Base de datos de Scryvex (persistente)
            - ./volume:/server/volume

            # NVR storage local (descomenta y ajustá la ruta):
            # - /mnt/media/video:/nvr

            # Avahi Opción A: servicios del host (ej: Time Machine)
            # - /etc/avahi/services:/etc/avahi/services:ro

            # Avahi Opción B (solo bridge networking):
            # - /var/run/dbus:/var/run/dbus
            # - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket

        devices: []
            # Descomenta los dispositivos que necesites:
            # - "/dev/bus/usb:/dev/bus/usb"    # Coral TPU USB
            # - "/dev/dri:/dev/dri"            # GPU decode / OpenCL
            # - "/dev/kfd:/dev/kfd"            # AMD GPU
            # - "/dev/ttyACM0:/dev/ttyACM0"    # Z-Wave USB

        logging:
            driver: "none"
            # Habilitar solo para debug:
            # driver: "json-file"
            # options:
            #     max-size: "10m"
            #     max-file: "10"

        labels:
            - "com.centurylinklabs.watchtower.scope=scryvex"

        dns:
            - ${SCRYPTED_DNS_SERVER_0:-1.1.1.1}
            - ${SCRYPTED_DNS_SERVER_1:-8.8.8.8}


    # ── Watchtower — gestor de auto-updates ──────────────────
    watchtower:
        image: nickfedor/watchtower
        container_name: scryvex-watchtower
        restart: unless-stopped

        environment:
            - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-env_missing_fallback}
            - WATCHTOWER_HTTP_API_UPDATE=true
            - WATCHTOWER_SCOPE=scryvex
            - WATCHTOWER_HTTP_API_PERIODIC_POLLS=${WATCHTOWER_HTTP_API_PERIODIC_POLLS:-true}

        volumes:
            - /var/run/docker.sock:/var/run/docker.sock

        labels:
            - "com.centurylinklabs.watchtower.scope=scryvex"

        ports:
            - 10444:8080

        # Revisar updates cada hora
        command: --interval 3600 --cleanup --scope scryvex

        dns:
            - ${SCRYPTED_DNS_SERVER_0:-1.1.1.1}
            - ${SCRYPTED_DNS_SERVER_1:-8.8.8.8}
